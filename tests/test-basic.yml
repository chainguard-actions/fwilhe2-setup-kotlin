name: Test basic usage - default version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
      - name: Assert kotlinc is available
        run: |
          echo "Checking kotlinc is on PATH..."
          if ! command -v kotlinc &>/dev/null; then
            echo "FAIL: kotlinc not found on PATH"
            exit 1
          fi
          echo "PASS: kotlinc found at $(command -v kotlinc)"
      - name: Assert kotlin version output
        run: |
          VERSION=$(kotlinc -version 2>&1 || true)
          echo "kotlinc version output: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "FAIL: kotlinc -version returned empty output"
            exit 1
          fi
          echo "PASS"
