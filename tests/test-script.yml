name: Test script execution
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create Kotlin script
        run: |
          cat > /tmp/hello.main.kts <<'EOF'
          println("Hello from Kotlin script!")
          EOF
      - id: action
        uses: .
        with:
          version: '2.2.21'
          script: '/tmp/hello.main.kts'
      - name: Assert script executed successfully
        run: |
          echo "Script step completed without error"
          echo "PASS"
