name: Test script execution
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create a simple Kotlin script
        run: |
          cat > /tmp/hello.main.kts <<'EOF'
          println("Hello from Kotlin script!")
          EOF
      - id: action
        uses: .
        with:
          version: '2.3.10'
          script: '/tmp/hello.main.kts'
      - name: Assert kotlinc is available after script run
        run: |
          echo "Checking kotlinc is on PATH..."
          if ! command -v kotlinc &>/dev/null; then
            echo "FAIL: kotlinc not found on PATH"
            exit 1
          fi
          echo "PASS: kotlinc found at $(command -v kotlinc)"
