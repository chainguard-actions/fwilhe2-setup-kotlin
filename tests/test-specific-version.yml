name: Test Kotlin setup with specific version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq default-jdk
      - id: setup-kotlin
        uses: .
        with:
          version: '1.9.25'
          install-native: 'false'
      - name: Assert kotlinc is available
        run: |
          echo "Checking kotlinc availability..."
          if ! command -v kotlinc > /dev/null 2>&1; then
            echo "FAIL: kotlinc not found in PATH"
            exit 1
          fi
          echo "PASS: kotlinc found at $(command -v kotlinc)"
      - name: Assert kotlin version matches requested version
        run: |
          VERSION_OUTPUT=$(kotlinc -version 2>&1 || true)
          echo "kotlinc version output: $VERSION_OUTPUT"
          if ! echo "$VERSION_OUTPUT" | grep -q "1.9.25"; then
            echo "FAIL: expected version 1.9.25 in output"
            exit 1
          fi
          echo "PASS: version 1.9.25 found"
      - name: Assert KOTLIN_HOME is set
        run: |
          echo "KOTLIN_HOME: $KOTLIN_HOME"
          if [ -z "$KOTLIN_HOME" ]; then
            echo "FAIL: KOTLIN_HOME is not set"
            exit 1
          fi
          echo "PASS: KOTLIN_HOME is set to $KOTLIN_HOME"
